<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestion Administrative — Casino Barrière Bordeaux</title>
  <link rel="stylesheet" href="shared/barriere.css" />
  <style>
    .app { padding: 64px 20px 80px; }
    .hdr { margin-bottom: 52px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      width: 100%; max-width: 1100px;
    }
    @media(max-width:800px){ .grid { grid-template-columns: repeat(2, 1fr); } }
    @media(max-width:400px){ .grid { grid-template-columns: 1fr; } }

    /* ── Couleurs par carte ── */
    .tool-card             { --accent: 128,108,196; } /* indigo  */
    .tool-card.c-rose      { --accent: 196,105,90;  } /* corail  */

    /* ── Carte ── */
    .tool-card {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; text-decoration: none;
      min-height: 192px; padding: 32px 24px;
      background: var(--bg-card);
      border: 1px solid rgba(var(--accent),.14);
      border-radius: 3px; position: relative; overflow: hidden;
      transition: border-color .2s, background .2s, transform .16s;
    }
    .tool-card::before, .tool-card::after {
      content: ''; position: absolute;
      width: 10px; height: 10px;
      border-color: rgb(var(--accent)); border-style: solid; opacity: .22;
      transition: opacity .2s;
    }
    .tool-card::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
    .tool-card::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }
    .tool-card:hover {
      border-color: rgba(var(--accent),.38);
      background: rgba(20,17,10,.95);
      transform: translateY(-2px);
    }
    .tool-card:hover::before, .tool-card:hover::after { opacity: .6; }

    body.light .tool-card { background: rgba(255,252,244,.97); box-shadow: 0 2px 14px rgba(0,0,0,.05); }
    body.light .tool-card:hover { background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,.08); }

    /* ── Badge emoji ── */
    .tool-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 62px; height: 62px; flex-shrink: 0; margin-bottom: 18px;
      background: linear-gradient(140deg, rgba(var(--accent),.13), rgba(var(--accent),.04));
      border: 1px solid rgba(var(--accent),.22);
      border-radius: 4px; font-size: 27px;
      transition: background .2s, border-color .2s;
    }
    .tool-card:hover .tool-badge {
      background: linear-gradient(140deg, rgba(var(--accent),.22), rgba(var(--accent),.09));
      border-color: rgba(var(--accent),.46);
    }
    body.light .tool-badge {
      background: linear-gradient(140deg, rgba(var(--accent),.1), rgba(var(--accent),.03));
    }

    /* ── Titre ── */
    .tool-name {
      font-family: var(--f-display); font-size: 17px; font-weight: 600;
      color: var(--cream); line-height: 1.2;
    }
    .tool-name em { font-style: italic; color: rgb(var(--accent)); }

    .footer {
      margin-top: 52px; text-align: center;
      font-size: 10px; letter-spacing: .14em; color: var(--text-muted);
    }

  </style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()">
  <span id="theme-icon">☀️</span> <span id="theme-label">Mode jour</span>
</button>

<div class="app">
  <a href="index.html" class="back">← Menu</a>

  <div class="hdr">
    <span class="hdr-logo">Casino Barrière · Bordeaux</span>
    <div class="hdr-title">Gestion <em>Administrative</em></div>
    <div class="hdr-sub">Déclarations mensuelles — Service Course et Jeux · Police Judiciaire</div>
  </div>

  <div class="grid">

    <a href="declaration/declaration.html" class="tool-card">
      <div class="tool-badge">📋</div>
      <div class="tool-name">Déclaration <em>Tournois</em></div>
    </a>

    <a href="extras/extras.html" class="tool-card c-rose">
      <div class="tool-badge">👥</div>
      <div class="tool-name">Déclaration <em>Extras</em></div>
    </a>

    <a href="admin/tournois.html" class="tool-card" style="--accent:196,160,74">
      <div class="tool-badge">🎴</div>
      <div class="tool-name">Config <em>Tournois</em></div>
    </a>

    <a href="admin/comptes.html" class="tool-card" style="--accent:80,160,200">
      <div class="tool-badge">🔑</div>
      <div class="tool-name">Gestion <em>Comptes</em></div>
    </a>

  </div>

  <div class="footer">Casino Barrière Bordeaux · Outils internes tournois</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared/barriere.js"></script>
<script src="shared/supabase.js"></script>
<script src="shared/auth.js"></script>
<script>AUTH.guard({ loginUrl: 'login.html', role: 'admin' });</script>
</body>
</html>
