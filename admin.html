<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestion Administrative — Casino Barrière Bordeaux</title>
  <link rel="stylesheet" href="shared/barriere.css" />
  <style>
    .app { padding: 64px 20px 80px; }
    .hdr { margin-bottom: 52px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      width: 100%; max-width: 580px;
    }
    @media(max-width:460px){ .grid { grid-template-columns: 1fr; } }

    .tool-card {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; text-decoration: none;
      min-height: 188px; padding: 32px 24px;
      background: var(--bg-card);
      border: 1px solid rgba(196,160,74,.13);
      border-radius: 3px; position: relative; overflow: hidden;
      transition: border-color .2s, background .2s, transform .16s;
    }
    .tool-card::before, .tool-card::after {
      content: ''; position: absolute;
      width: 10px; height: 10px;
      border-color: var(--gold); border-style: solid; opacity: .22;
      transition: opacity .2s;
    }
    .tool-card::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
    .tool-card::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }
    .tool-card:hover {
      border-color: rgba(196,160,74,.35);
      background: rgba(28,24,16,.95);
      transform: translateY(-2px);
    }
    .tool-card:hover::before, .tool-card:hover::after { opacity: .6; }

    body.light .tool-card { background: rgba(255,252,244,.97); border-color: rgba(138,104,32,.18); box-shadow: 0 2px 14px rgba(0,0,0,.05); }
    body.light .tool-card:hover { background: #fff; border-color: rgba(138,104,32,.38); box-shadow: 0 4px 20px rgba(0,0,0,.08); }

    .tool-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 58px; height: 58px; flex-shrink: 0; margin-bottom: 18px;
      background: linear-gradient(140deg, rgba(196,160,74,.13), rgba(196,160,74,.05));
      border: 1px solid rgba(196,160,74,.22);
      border-radius: 4px;
      font-family: var(--f-num); font-size: 12px; font-weight: 700;
      letter-spacing: .08em; color: var(--gold);
      transition: background .2s, border-color .2s;
    }
    .tool-card:hover .tool-badge {
      background: linear-gradient(140deg, rgba(196,160,74,.22), rgba(196,160,74,.1));
      border-color: rgba(196,160,74,.48);
    }
    body.light .tool-badge {
      background: linear-gradient(140deg, rgba(138,104,32,.1), rgba(138,104,32,.04));
      border-color: rgba(138,104,32,.22);
    }

    .tool-name {
      font-family: var(--f-display); font-size: 17px; font-weight: 600;
      color: var(--cream); line-height: 1.2;
    }
    .tool-name em { font-style: italic; color: var(--gold); }

    .footer {
      margin-top: 52px; text-align: center;
      font-size: 10px; letter-spacing: .14em; color: var(--text-muted);
    }
  </style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()">
  <span id="theme-icon">☀️</span> <span id="theme-label">Mode jour</span>
</button>

<div class="app">
  <a href="index.html" class="back">← Menu</a>

  <div class="hdr">
    <span class="hdr-logo">Casino Barrière · Bordeaux</span>
    <div class="hdr-title">Gestion <em>Administrative</em></div>
    <div class="hdr-sub">Déclarations mensuelles — Service Course et Jeux · Police Judiciaire</div>
  </div>

  <div class="grid">

    <a href="declaration/declaration.html" class="tool-card">
      <div class="tool-badge">DTPJ</div>
      <div class="tool-name">Déclaration <em>Tournois</em></div>
    </a>

    <a href="extras/extras.html" class="tool-card">
      <div class="tool-badge">EXT</div>
      <div class="tool-name">Déclaration <em>Extras</em></div>
    </a>

  </div>

  <div class="footer">Casino Barrière Bordeaux · Outils internes tournois</div>
</div>

<script src="shared/barriere.js"></script>
</body>
</html>
