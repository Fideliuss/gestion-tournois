<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Déclarations — Casino Barrière Bordeaux</title>
  <link rel="stylesheet" href="shared/barriere.css" />
  <style>
    .app { padding: 64px 20px 80px; }
    .hdr { margin-bottom: 52px; }

    .tool-card           { --accent: 128,108,196; } /* indigo */
    .tool-card.c-rose    { --accent: 196,105,90;  } /* corail */

    .footer {
      margin-top: 52px; text-align: center;
      font-size: 10px; letter-spacing: .14em; color: var(--text-muted);
    }
  </style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()">
  <span id="theme-icon">☀️</span> <span id="theme-label">Mode jour</span>
</button>

<div class="app">
  <a href="admin.html" class="back">← Administration</a>

  <div class="hdr">
    <span class="hdr-logo">Casino Barrière · Bordeaux</span>
    <div class="hdr-title">Espace <em>Déclarations</em></div>
    <div class="hdr-sub">Déclarations mensuelles — Service Course et Jeux · Police Judiciaire</div>
  </div>

  <div class="grid">

    <a href="declaration/declaration.html" class="tool-card">
      <div class="tool-badge">📋</div>
      <div class="tool-name">Déclaration <em>Tournois</em></div>
    </a>

    <a href="extras/extras.html" class="tool-card c-rose">
      <div class="tool-badge">👥</div>
      <div class="tool-name">Déclaration <em>Extras</em></div>
    </a>

  </div>

  <div class="footer">Casino Barrière Bordeaux · Outils internes tournois</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared/barriere.js"></script>
<script src="shared/supabase.js"></script>
<script src="shared/auth.js"></script>
<script>AUTH.guard({ loginUrl: 'login.html', panel: ['declarations', 'extras'] });</script>
</body>
</html>
