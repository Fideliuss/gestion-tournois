<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Outils Tournois — Casino Barrière Bordeaux</title>
  <link rel="stylesheet" href="shared/barriere.css" />
  <style>
    .app { padding: 64px 20px 80px; }
    .hdr { margin-bottom: 52px; }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      width: 100%; max-width: 860px;
    }
    @media(max-width:720px){ .grid { grid-template-columns: repeat(2,1fr); } }
    @media(max-width:460px){ .grid { grid-template-columns: 1fr; } }

    /* ── Couleurs par carte ── */
    .tool-card               { --accent: 196,160,74;  } /* or      */
    .tool-card.c-blue        { --accent: 82,148,210;  } /* bleu    */
    .tool-card.c-teal        { --accent: 72,175,150;  } /* teal    */

    /* ── Carte ── */
    .tool-card {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; text-decoration: none;
      min-height: 192px; padding: 32px 24px;
      background: var(--bg-card);
      border: 1px solid rgba(var(--accent),.14);
      border-radius: 3px; position: relative; overflow: hidden;
      transition: border-color .2s, background .2s, transform .16s;
    }
    .tool-card::before, .tool-card::after {
      content: ''; position: absolute;
      width: 10px; height: 10px;
      border-color: rgb(var(--accent)); border-style: solid; opacity: .22;
      transition: opacity .2s;
    }
    .tool-card::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
    .tool-card::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }
    .tool-card:hover {
      border-color: rgba(var(--accent),.38);
      background: rgba(20,17,10,.95);
      transform: translateY(-2px);
    }
    .tool-card:hover::before, .tool-card:hover::after { opacity: .6; }

    body.light .tool-card { background: rgba(255,252,244,.97); box-shadow: 0 2px 14px rgba(0,0,0,.05); }
    body.light .tool-card:hover { background: #fff; box-shadow: 0 4px 20px rgba(0,0,0,.08); }

    /* ── Badge emoji ── */
    .tool-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 62px; height: 62px; flex-shrink: 0; margin-bottom: 18px;
      background: linear-gradient(140deg, rgba(var(--accent),.13), rgba(var(--accent),.04));
      border: 1px solid rgba(var(--accent),.22);
      border-radius: 4px; font-size: 27px;
      transition: background .2s, border-color .2s;
    }
    .tool-card:hover .tool-badge {
      background: linear-gradient(140deg, rgba(var(--accent),.22), rgba(var(--accent),.09));
      border-color: rgba(var(--accent),.46);
    }
    body.light .tool-badge {
      background: linear-gradient(140deg, rgba(var(--accent),.1), rgba(var(--accent),.03));
    }

    /* ── Titre ── */
    .tool-name {
      font-family: var(--f-display); font-size: 17px; font-weight: 600;
      color: var(--cream); line-height: 1.2;
    }
    .tool-name em { font-style: italic; color: rgb(var(--accent)); }

    /* ── Footer ── */
    .footer {
      margin-top: 52px; text-align: center;
      font-size: 10px; letter-spacing: .14em; color: var(--text-muted);
    }
    .footer-version {
      display: inline-block; margin-top: 6px;
      font-family: var(--f-num); font-size: 9px;
      color: var(--text-muted); letter-spacing: .12em; opacity: .55;
    }
    details.changelog {
      margin-top: 10px; display: inline-block;
      font-family: var(--f-ui); font-size: 10px;
      color: var(--text-muted); letter-spacing: 0; text-align: left;
    }
    details.changelog summary {
      cursor: pointer; letter-spacing: .12em; list-style: none; outline: none;
      color: var(--text-muted); transition: color .18s;
    }
    details.changelog summary::-webkit-details-marker { display: none; }
    details.changelog summary:hover { color: var(--gold-dim); }
    details.changelog[open] summary { color: var(--gold-dim); margin-bottom: 10px; }
    .cl-list {
      border-left: 1px solid rgba(196,160,74,.18);
      padding-left: 14px; display: flex; flex-direction: column; gap: 10px;
    }
    .cl-version { font-family: var(--f-num); font-size: 9px; color: var(--gold-dim); margin-bottom: 3px; }
    .cl-entries { list-style: none; display: flex; flex-direction: column; gap: 3px; }
    .cl-entries li { font-size: 10px; color: var(--text-muted); }
    .cl-entries li::before { content: '· '; color: var(--gold-dim); }
  </style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()">
  <span id="theme-icon">☀️</span> <span id="theme-label">Mode jour</span>
</button>

<div class="app">
  <div class="hdr">
    <span class="hdr-logo">Casino Barrière · Bordeaux</span>
    <div class="hdr-title">Outils <em>Tournois</em></div>
    <div class="hdr-sub">Gestion interne des tournois de poker</div>
  </div>

  <div class="grid">

    <a href="prize-pool/prize-pool.html" class="tool-card">
      <div class="tool-badge">🎯</div>
      <div class="tool-name">Prize Pool <em>Builder</em></div>
    </a>

    <a href="leaderboard/leaderboard.html" class="tool-card c-blue">
      <div class="tool-badge">🏆</div>
      <div class="tool-name">Challenge <em>Saisonnier</em></div>
    </a>

    <a href="admin.html" class="tool-card c-teal">
      <div class="tool-badge">📁</div>
      <div class="tool-name">Gestion <em>Administrative</em></div>
    </a>

  </div>

  <div class="footer">
    Casino Barrière Bordeaux · Outils internes tournois
    <br><span class="footer-version" id="app-version"></span>
    <br>
    <details class="changelog">
      <summary>Changelog ▾</summary>
      <div class="cl-list" id="cl-list"></div>
    </details>
  </div>
</div>

<script src="shared/changelog.js"></script>
<script src="shared/barriere.js"></script>
<script>
(function () {
  if (!window.CHANGELOG || !CHANGELOG.length) return;
  var ver = document.getElementById('app-version');
  if (ver) ver.textContent = CHANGELOG[0].version;
  var list = document.getElementById('cl-list');
  if (!list) return;
  list.innerHTML = CHANGELOG.map(function (e) {
    return '<div>'
      + '<div class="cl-version">' + e.version + ' &mdash; ' + e.date + '</div>'
      + '<ul class="cl-entries"><li>' + e.message + '</li></ul>'
      + '</div>';
  }).join('');
})();
</script>
</body>
</html>
