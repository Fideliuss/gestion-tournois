<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Casino Barrière Bordeaux</title>
  <link rel="stylesheet" href="shared/barriere.css" />
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; box-sizing: border-box; }

    .login-card {
      width: 100%; max-width: 360px;
      background: var(--card-bg, #1e1e1e);
      border: 1px solid var(--border, rgba(255,255,255,.08));
      border-radius: 16px; padding: 44px 32px 36px;
      text-align: center;
    }

    .login-logo  { font-size: 11px; letter-spacing: .12em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
    .login-title { font-size: 23px; font-weight: 700; margin: 0 0 6px; }
    .login-sub   { font-size: 13px; color: var(--text-muted); margin: 0 0 36px; line-height: 1.5; }

    /* Bouton Google */
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 13px 20px;
      background: #fff; color: #3c4043;
      border: 1px solid #dadce0; border-radius: 8px;
      font-family: 'Google Sans', Roboto, sans-serif; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: box-shadow .2s, background .15s;
      text-decoration: none;
    }
    .btn-google:hover   { box-shadow: 0 1px 6px rgba(0,0,0,.2); background: #f8f8f8; }
    .btn-google:active  { background: #f0f0f0; }
    .btn-google:disabled { opacity: .5; cursor: not-allowed; }
    .btn-google svg     { flex-shrink: 0; }

    .login-note  { margin-top: 16px; font-size: 11px; color: var(--text-muted); opacity: .7; }

    /* Message d'erreur */
    .login-err {
      display: none; margin-bottom: 20px;
      background: rgba(231,76,60,.1); border: 1px solid rgba(231,76,60,.3);
      border-radius: 8px; padding: 10px 14px;
      font-size: 12px; color: #e74c3c; line-height: 1.5;
    }
    .login-err.visible { display: block; }

    .login-hr      { border: none; border-top: 1px solid var(--border, rgba(255,255,255,.08)); margin: 28px 0 16px; }
    .login-version { font-size: 11px; color: var(--text-muted); opacity: .45; }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-logo">Casino Barrière · Bordeaux</div>
  <div class="login-title">Connexion</div>
  <div class="login-sub">Outils de gestion des tournois<br>Accès réservé au personnel Barrière</div>

  <div class="login-err" id="login-err"></div>

  <button class="btn-google" id="btn-google" onclick="signInWithGoogle()">
    <!-- Logo Google officiel -->
    <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
      <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
      <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
      <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
      <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
    </svg>
    Se connecter avec Google
  </button>

  <div class="login-note">Utilise ton compte @groupebarriere.com</div>

  <div class="login-hr"></div>
  <div class="login-version" id="login-version"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared/changelog.js"></script>
<script src="shared/supabase.js"></script>
<script>
// Afficher la version
if (window.CHANGELOG?.[0]) {
  document.getElementById('login-version').textContent = CHANGELOG[0].version;
}

// Afficher une erreur si redirigé avec ?err=
const params = new URLSearchParams(window.location.search);
if (params.get('err') === 'domain') {
  const el = document.getElementById('login-err');
  el.textContent = 'Accès refusé — seuls les comptes @groupebarriere.com sont autorisés.';
  el.classList.add('visible');
}

// Écouter l'état d'auth — capte le retour OAuth Google
SB.onAuthStateChange((event, session) => {
  if (session) _redirect(session);
});

// Si déjà connecté au chargement
(async () => {
  const session = await SB.getSession();
  if (session) _redirect(session);
})();

function _redirect(session) {
  const role = session.user.user_metadata?.role || 'floor';
  window.location.replace(role === 'admin' ? 'index.html' : 'prize-pool/prize-pool.html');
}

async function signInWithGoogle() {
  const btn = document.getElementById('btn-google');
  btn.disabled = true;
  btn.querySelector('svg + *') // fallback
  btn.lastChild.textContent && (btn.lastChild.textContent = ' Connexion en cours…');
  try {
    await SB.signInWithGoogle();
    // La redirection OAuth se fait automatiquement — pas besoin de gérer la suite ici
  } catch(ex) {
    const el = document.getElementById('login-err');
    el.textContent = 'Erreur de connexion : ' + (ex.message || 'Réessaie dans quelques instants.');
    el.classList.add('visible');
    btn.disabled = false;
    btn.lastChild.textContent && (btn.lastChild.textContent = ' Se connecter avec Google');
  }
}
</script>
</body>
</html>
