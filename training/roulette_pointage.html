<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training Roulette Pointage — Casino Barrière Bordeaux</title>
  <link rel="stylesheet" href="../shared/barriere.css" />
  <link rel="stylesheet" href="training.css" />
  <link rel="stylesheet" href="roulette.css" />
  <style>
    .app {
      padding: 64px 20px 80px;
      display: flex; flex-direction: column; align-items: center;
    }
    .hdr { margin-bottom: 40px; text-align: center; }
  </style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()">
  <span id="theme-icon">☀️</span> <span id="theme-label">Mode jour</span>
</button>

<div class="app">
  <a href="roulette_hub.html" class="back">← Roulette</a>

  <div class="hdr">
    <span class="hdr-logo">Casino Barrière · Bordeaux</span>
    <div class="hdr-title">Roulette <em>Pointage</em></div>
  </div>

  <!-- ══ Sélection niveau ══ -->
  <div id="pt-level-screen" style="width:100%;max-width:480px">
    <div style="font-size:13px;color:var(--text-dim);text-align:center;margin-bottom:24px;font-family:var(--f-ui)">
      Choisissez votre niveau
    </div>
    <div class="level-grid">
      <div class="level-card" onclick="startPointageLevel('facile')">
        <div class="level-name facile">Facile</div>
        <div class="level-timer" id="pt-timer-facile">10</div>
        <div class="level-unit">secondes</div>
      </div>
      <div class="level-card" onclick="startPointageLevel('medium')">
        <div class="level-name medium">Médium</div>
        <div class="level-timer" id="pt-timer-medium">6</div>
        <div class="level-unit">secondes</div>
      </div>
      <div class="level-card" onclick="startPointageLevel('expert')">
        <div class="level-name expert">Expert</div>
        <div class="level-timer" id="pt-timer-expert">3</div>
        <div class="level-unit">secondes</div>
      </div>
    </div>
  </div>

  <!-- ══ Écran entraînement ══ -->
  <div id="pt-training-screen" style="display:none;width:100%;max-width:820px">

    <div class="training-header">
      <span class="training-progress" id="pt-progress">Question 1 / 10</span>
      <span class="training-score"    id="pt-score">Score : 0 / 0</span>
    </div>
    <div class="progress-bar-wrap" style="max-width:820px">
      <div class="progress-bar-fill" id="pt-progress-fill" style="width:0%"></div>
    </div>

    <!-- Balle cylindre -->
    <div style="text-align:center;padding:20px 0 8px">
      <div style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-muted);font-family:var(--f-ui);margin-bottom:10px">
        Le cylindre annonce
      </div>
      <div class="pt-ball green" id="pt-announced">0</div>
    </div>

    <!-- Timer -->
    <div class="timer-wrap">
      <span class="timer-label">Temps</span>
      <span class="timer-display" id="pt-timer-display">10</span>
      <span class="timer-label">s</span>
    </div>
    <div class="timer-bar-wrap" style="max-width:820px">
      <div class="timer-bar-fill" id="pt-timer-bar" style="width:100%"></div>
    </div>

    <!-- Tapis cliquable -->
    <div class="pt-tapis-wrap">
      <div id="pt-tapis"></div>
    </div>

    <div class="feedback-bar empty" id="pt-feedback" style="max-width:820px;margin-top:12px"></div>

    <div style="text-align:center;margin-top:16px">
      <button class="btn btn-gold" id="pt-next-btn" onclick="manualNext()"
              style="display:none;padding:10px 28px;font-size:13px">
        Question suivante →
      </button>
    </div>

  </div>

  <!-- ══ Résumé ══ -->
  <div id="pt-summary-screen" style="display:none">
    <div class="session-summary">
      <div style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;
                  font-family:var(--f-ui);color:var(--text-muted);margin-bottom:12px"
           id="pt-summary-level"></div>
      <div class="summary-score-big"   id="pt-summary-score">8/10</div>
      <div class="summary-score-label" id="pt-summary-pct">80%</div>
      <div class="summary-verdict"     id="pt-summary-verdict">Bien</div>
      <div class="summary-actions">
        <button class="btn btn-gold"  onclick="restartPointage()"
                style="padding:12px 28px;font-size:13px">↺ Rejouer</button>
        <a href="roulette_hub.html" class="btn btn-ghost"
           style="padding:12px 28px;font-size:13px;text-decoration:none">← Roulette</a>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../shared/barriere.js"></script>
<script src="../shared/supabase.js"></script>
<script src="../shared/auth.js"></script>
<script src="roulette_tapis.js"></script>
<script src="roulette_pointage.js"></script>
<script>
AUTH.guard({ loginUrl: '../login.html', panel: 'training' }).then(function(user) {
  if (!user) return;
  initPointage();
});
</script>
</body>
</html>
