<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training BJ Score — Casino Barrière Bordeaux</title>
  <link rel="stylesheet" href="../shared/barriere.css" />
  <link rel="stylesheet" href="training.css" />
  <style>
    .app {
      padding: 64px 20px 80px;
      display: flex; flex-direction: column; align-items: center;
    }
    .hdr { margin-bottom: 40px; text-align: center; }

    /* ── Sélection de niveau ── */
    .level-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 14px; width: 100%; max-width: 480px; margin-top: 8px;
    }
    .level-card {
      background: var(--bg-card); border: 1px solid var(--gold-bd);
      border-radius: 4px; padding: 24px 16px; text-align: center;
      cursor: pointer; transition: border-color .15s, background .15s;
      position: relative;
    }
    .level-card::before, .level-card::after {
      content: ''; position: absolute;
      width: 8px; height: 8px;
      border-color: var(--gold); border-style: solid; opacity: .2;
    }
    .level-card::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
    .level-card::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }
    .level-card:hover { border-color: rgba(196,160,74,.5); background: rgba(196,160,74,.04); }
    .level-card:hover::before, .level-card:hover::after { opacity: .5; }

    .level-name {
      font-size: 11px; font-weight: 700; letter-spacing: .18em;
      text-transform: uppercase; font-family: var(--f-ui);
      margin-bottom: 10px;
    }
    .level-name.facile { color: #6dcc8e; }
    .level-name.medium { color: var(--gold); }
    .level-name.expert { color: #e07a68; }

    .level-timer {
      font-family: var(--f-num); font-size: 32px; font-weight: 700;
      color: var(--cream); line-height: 1;
    }
    .level-unit {
      font-size: 11px; color: var(--text-muted); margin-top: 4px;
      font-family: var(--f-ui); letter-spacing: .08em;
    }
  </style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()">
  <span id="theme-icon">☀️</span> <span id="theme-label">Mode jour</span>
</button>

<div class="app">
  <a href="blackjack_hub.html" class="back">← Blackjack</a>

  <div class="hdr">
    <span class="hdr-logo">Casino Barrière · Bordeaux</span>
    <div class="hdr-title">BJ <em>Score</em></div>
  </div>

  <!-- ══ Sélection de niveau ══ -->
  <div id="level-screen">
    <div style="font-size:13px;color:var(--text-dim);text-align:center;margin-bottom:24px;font-family:var(--f-ui)">
      Choisissez votre niveau
    </div>
    <div class="level-grid">
      <div class="level-card" onclick="startWithLevel('facile')">
        <div class="level-name facile">Facile</div>
        <div class="level-timer" id="timer-facile">15</div>
        <div class="level-unit">secondes</div>
      </div>
      <div class="level-card" onclick="startWithLevel('medium')">
        <div class="level-name medium">Médium</div>
        <div class="level-timer" id="timer-medium">10</div>
        <div class="level-unit">secondes</div>
      </div>
      <div class="level-card" onclick="startWithLevel('expert')">
        <div class="level-name expert">Expert</div>
        <div class="level-timer" id="timer-expert">5</div>
        <div class="level-unit">secondes</div>
      </div>
    </div>
  </div>

  <!-- ══ Écran entraînement ══ -->
  <div id="training-screen" style="display:none">

    <div class="training-header">
      <span class="training-progress" id="progress-text">Question 1 / 10</span>
      <span class="training-score"    id="score-text">Score : 0 / 0</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>

    <div class="timer-wrap">
      <span class="timer-label">Temps</span>
      <span class="timer-display" id="timer-display">10</span>
      <span class="timer-label">s</span>
    </div>
    <div class="timer-bar-wrap">
      <div class="timer-bar-fill" id="timer-bar" style="width:100%"></div>
    </div>

    <div class="cards-zone" id="cards-zone"></div>

    <div class="answer-zone">
      <div class="answer-question">Quelle est la valeur de cette main ?</div>
      <div class="answer-row" style="margin-top:12px">
        <input type="number" id="answer-input" class="answer-input"
               placeholder="0" min="1" max="30" step="1"
               onkeydown="if(event.key==='Enter')submitAnswer()" />
        <span class="answer-currency" style="font-size:16px;color:var(--text-dim)">pts</span>
        <button class="btn btn-gold" id="submit-btn" onclick="submitAnswer()"
                style="padding:10px 20px;font-size:13px">→</button>
      </div>
    </div>

    <div class="feedback-bar empty" id="feedback-bar"></div>

  </div>

  <!-- ══ Écran résumé ══ -->
  <div id="summary-screen" style="display:none">
    <div class="session-summary">
      <div style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;
                  font-family:var(--f-ui);color:var(--text-muted);margin-bottom:12px"
           id="summary-level"></div>
      <div class="summary-score-big"   id="summary-score">8/10</div>
      <div class="summary-score-label" id="summary-pct">80%</div>
      <div class="summary-verdict"     id="summary-verdict">Excellent !</div>
      <div class="summary-actions">
        <button class="btn btn-gold"  onclick="restartSession()"
                style="padding:12px 28px;font-size:13px">↺ Rejouer</button>
        <a href="blackjack_hub.html" class="btn btn-ghost"
           style="padding:12px 28px;font-size:13px;text-decoration:none">← Blackjack</a>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../shared/barriere.js"></script>
<script src="../shared/supabase.js"></script>
<script src="../shared/auth.js"></script>
<script src="blackjack_score.js"></script>
<script>
AUTH.guard({ loginUrl: '../login.html', panel: 'training' }).then(function(user) {
  if (!user) return;
  initScore();
});
</script>
</body>
</html>
