<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training Roulette Conversion — Casino Barrière Bordeaux</title>
  <link rel="stylesheet" href="../shared/barriere.css" />
  <link rel="stylesheet" href="training.css" />
  <link rel="stylesheet" href="roulette.css" />
  <style>
    .app {
      padding: 64px 20px 80px;
      display: flex; flex-direction: column; align-items: center;
    }
    .hdr { margin-bottom: 40px; text-align: center; }
  </style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()">
  <span id="theme-icon">☀️</span> <span id="theme-label">Mode jour</span>
</button>

<div class="app">
  <a href="roulette_hub.html" class="back">← Roulette</a>

  <div class="hdr">
    <span class="hdr-logo">Casino Barrière · Bordeaux</span>
    <div class="hdr-title">Roulette <em>Conversion</em></div>
  </div>

  <!-- ══ Sélection valeur de pièce ══ -->
  <div id="cv-chipval-screen" style="width:100%;max-width:560px">
    <div style="font-size:13px;color:var(--text-dim);text-align:center;margin-bottom:24px;font-family:var(--f-ui)">
      Choisissez la valeur de la pièce
    </div>
    <div class="chipval-grid" id="cv-chipval-grid"></div>
  </div>

  <!-- ══ Sélection niveau ══ -->
  <div id="cv-level-screen" style="display:none;width:100%;max-width:480px">
    <div style="font-size:13px;color:var(--text-dim);text-align:center;margin-bottom:24px;font-family:var(--f-ui)">
      Choisissez votre niveau
    </div>
    <div class="level-grid">
      <div class="level-card" onclick="startConversionLevel('facile')">
        <div class="level-name facile">Facile</div>
        <div class="level-timer" id="cv-timer-facile">12</div>
        <div class="level-unit">secondes</div>
      </div>
      <div class="level-card" onclick="startConversionLevel('medium')">
        <div class="level-name medium">Médium</div>
        <div class="level-timer" id="cv-timer-medium">8</div>
        <div class="level-unit">secondes</div>
      </div>
      <div class="level-card" onclick="startConversionLevel('expert')">
        <div class="level-name expert">Expert</div>
        <div class="level-timer" id="cv-timer-expert">4</div>
        <div class="level-unit">secondes</div>
      </div>
    </div>
  </div>

  <!-- ══ Écran entraînement ══ -->
  <div id="cv-training-screen" style="display:none;width:100%;max-width:560px">

    <div class="training-header">
      <span class="training-progress" id="cv-progress">Question 1 / 10</span>
      <span class="training-score"    id="cv-score">Score : 0 / 0</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="cv-progress-fill" style="width:0%"></div>
    </div>

    <div class="timer-wrap">
      <span class="timer-label">Temps</span>
      <span class="timer-display" id="cv-timer-display">12</span>
      <span class="timer-label">s</span>
    </div>
    <div class="timer-bar-wrap">
      <div class="timer-bar-fill" id="cv-timer-bar" style="width:100%"></div>
    </div>

    <!-- Affichage pièces -->
    <div class="conv-display">
      <div class="conv-label">Pièces payées</div>
      <div class="conv-chips" id="cv-chips">23</div>
      <div class="conv-value-badge" id="cv-value-badge">× 5 €</div>
    </div>

    <!-- Réponse -->
    <div class="answer-zone">
      <div class="answer-question">Quelle est la valeur totale payée ?</div>
      <div class="answer-row" style="margin-top:12px">
        <input type="number" id="cv-answer-input" class="answer-input"
               placeholder="0" min="0" step="0.5"
               onkeydown="if(event.key==='Enter')submitConversion()" />
        <span class="answer-currency">€</span>
        <button class="btn btn-gold" id="cv-submit-btn" onclick="submitConversion()"
                style="padding:10px 20px;font-size:13px">→</button>
      </div>
    </div>

    <div class="feedback-bar empty" id="cv-feedback"></div>

    <div style="text-align:center;margin-top:16px">
      <button class="btn btn-gold" id="cv-next-btn" onclick="manualNextConversion()"
              style="display:none;padding:10px 28px;font-size:13px">
        Question suivante →
      </button>
    </div>

  </div>

  <!-- ══ Résumé ══ -->
  <div id="cv-summary-screen" style="display:none">
    <div class="session-summary">
      <div style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;
                  font-family:var(--f-ui);color:var(--text-muted);margin-bottom:12px"
           id="cv-summary-level"></div>
      <div class="summary-score-big"   id="cv-summary-score">8/10</div>
      <div class="summary-score-label" id="cv-summary-pct">80%</div>
      <div class="summary-verdict"     id="cv-summary-verdict">Bien</div>
      <div class="summary-actions">
        <button class="btn btn-gold"  onclick="restartConversion()"
                style="padding:12px 28px;font-size:13px">↺ Rejouer</button>
        <a href="roulette_hub.html" class="btn btn-ghost"
           style="padding:12px 28px;font-size:13px;text-decoration:none">← Roulette</a>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../shared/barriere.js"></script>
<script src="../shared/supabase.js"></script>
<script src="../shared/auth.js"></script>
<script src="roulette_conversion.js"></script>
<script>
AUTH.guard({ loginUrl: '../login.html', panel: 'training' }).then(function(user) {
  if (!user) return;
  initConversion();
});
</script>
</body>
</html>
