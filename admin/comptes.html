<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Config Comptes — Casino Barrière Bordeaux</title>
  <link rel="stylesheet" href="../shared/barriere.css" />
  <style>

    .app { padding: 64px 20px 100px; max-width: 820px; margin: 0 auto; }

    /* ── Actions haut de page ── */
    .top-actions { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }

    /* ── Liste des comptes ── */
    .account-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      align-items: center; gap: 14px;
      padding: 13px 0;
      border-bottom: 1px solid rgba(196,160,74,.07);
    }
    .account-row:last-child { border-bottom: none; }
    .account-email { font-size: 13px; color: var(--cream); font-family: var(--f-ui); }

    .role-chip {
      font-size: 9px; font-weight: 700; letter-spacing: .12em;
      text-transform: uppercase; padding: 3px 9px; border-radius: 2px;
      white-space: nowrap;
    }
    .chip-admin  { background: rgba(196,160,74,.12); color: var(--gold);
      border: 1px solid rgba(196,160,74,.28); }
    .chip-mcd    { background: rgba(128,108,196,.12); color: #b0a0e0;
      border: 1px solid rgba(128,108,196,.28); }
    .chip-floor  { background: rgba(255,255,255,.05); color: var(--text-dim);
      border: 1px solid rgba(255,255,255,.08); }
    .chip-custom { background: rgba(80,160,200,.08); color: #7ab8d8;
      border: 1px solid rgba(80,160,200,.22); }

    .account-last {
      font-size: 10px; color: var(--text-muted); font-family: var(--f-num);
      white-space: nowrap;
    }
    .account-actions { display: flex; gap: 4px; }

    /* ── Table permissions ── */
    .perm-table-wrap { overflow-x: auto; }
    .perm-table {
      width: 100%; border-collapse: collapse;
      font-size: 12px; font-family: var(--f-ui);
    }
    .perm-table th {
      padding: 6px 10px 12px; text-align: center;
      font-size: 9px; font-weight: 600; letter-spacing: .16em;
      text-transform: uppercase; color: var(--gold-dim);
    }
    .perm-table th.col-role { text-align: left; min-width: 120px; padding-left: 0; }
    .perm-table th.col-del  { width: 32px; }
    .perm-table td {
      padding: 11px 10px; text-align: center;
      border-top: 1px solid rgba(196,160,74,.06);
      vertical-align: middle;
    }
    .perm-table td.col-role {
      text-align: left; padding-left: 0;
      font-size: 13px; color: var(--cream); font-weight: 500;
    }
    .perm-table tr:first-child td { border-top: none; }
    .perm-cb {
      width: 15px; height: 15px; cursor: pointer; accent-color: var(--gold);
    }
    .perm-dot {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 50%; background: rgba(196,160,74,.3);
      border: 1px solid rgba(196,160,74,.5);
    }

    /* ── Nouveau rôle ── */
    .new-role-row {
      display: flex; align-items: flex-end; gap: 12px;
      padding-top: 16px; margin-top: 8px;
      border-top: 1px solid rgba(196,160,74,.08);
      flex-wrap: wrap;
    }
    .new-role-row.hidden { display: none; }
    .new-role-slug {
      font-size: 11px; color: var(--text-muted);
      align-self: center; font-family: var(--f-num);
    }
    .new-role-slug b { color: var(--gold); font-weight: 500; }

    /* ── Perm actions ── */
    .perm-actions {
      display: flex; align-items: center; gap: 10px;
      margin-top: 20px; flex-wrap: wrap;
    }
    .perm-msg { font-size: 11px; font-family: var(--f-ui); }
    .perm-msg.ok  { color: #6dcc8e; }
    .perm-msg.err { color: #e07a68; }

    /* Light mode patches */
    body.light .account-row { border-bottom-color: rgba(0,0,0,.06); }
    body.light .perm-table td { border-top-color: rgba(0,0,0,.05); }
    body.light .account-email { color: var(--cream); }
    body.light .perm-table td.col-role { color: var(--cream); }

  </style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()">
  <span id="theme-icon">☀️</span> <span id="theme-label">Mode jour</span>
</button>

<div class="app">
  <a href="../configurations.html" class="back">← Configurations</a>

  <div class="hdr">
    <span class="hdr-logo">Casino Barrière · Bordeaux</span>
    <div class="hdr-title">Config <em>Comptes</em></div>
  </div>

  <!-- Alertes -->
  <div id="alert-ok"  class="alert-success" style="display:none"></div>
  <div id="alert-err" class="alert-warn"    style="display:none"></div>

  <!-- Actions -->
  <div class="top-actions">
    <button class="btn btn-gold" onclick="openForm()">＋ Nouveau compte</button>
    <button class="btn btn-ghost" id="btn-perm" onclick="togglePermissions()">⚙ Permissions</button>
  </div>

  <!-- Panneau permissions (inline) -->
  <div id="perm-panel" class="card hidden" style="margin-bottom:20px">
    <div class="sec">Gestion des rôles</div>
    <div class="perm-table-wrap">
      <table class="perm-table">
        <thead>
          <tr>
            <th class="col-role">Rôle</th>
            <th>Déclarations</th>
            <th>Extras</th>
            <th>Config.</th>
            <th>Prize Pool</th>
            <th>Leaderboard</th>
            <th class="col-del"></th>
          </tr>
        </thead>
        <tbody id="perm-table-body"></tbody>
      </table>
    </div>

    <!-- Formulaire nouveau rôle -->
    <div id="new-role-row" class="new-role-row hidden">
      <div class="fg" style="max-width:200px">
        <div class="fl">Label</div>
        <input type="text" id="new-role-label" placeholder="Ex : Superviseur" oninput="onNewRoleInput(this.value)" />
      </div>
      <div class="new-role-slug" id="new-role-slug-preview"></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-gold" onclick="confirmNewRole()">Créer →</button>
        <button class="btn btn-ghost" onclick="cancelNewRole()">Annuler</button>
      </div>
    </div>

    <div class="perm-actions">
      <button class="btn btn-ghost" id="btn-add-role" onclick="showNewRoleRow()">＋ Nouveau rôle</button>
      <button class="btn btn-gold"  id="perm-save-btn" onclick="savePermissions()">Enregistrer →</button>
      <span class="perm-msg" id="perm-msg"></span>
    </div>
  </div>

  <!-- Formulaire création / édition -->
  <div id="form-panel" class="card hidden" style="margin-bottom:20px">
    <div class="sec" id="form-sec">Nouveau compte</div>

    <div class="fg" style="margin-bottom:14px">
      <div class="fl">Adresse e-mail</div>
      <input type="email" id="inp-email" placeholder="prenom.nom@casinobarriere.com" />
    </div>
    <div class="fg" id="fg-password" style="margin-bottom:14px">
      <div class="fl">Mot de passe</div>
      <input type="password" id="inp-password" placeholder="8 caractères minimum" />
      <div class="fsub" id="pwd-hint">Laissez vide pour ne pas modifier</div>
    </div>
    <div class="fg" style="margin-bottom:20px">
      <div class="fl">Rôle</div>
      <select id="inp-role"></select>
    </div>

    <div style="display:flex;gap:8px">
      <button class="btn btn-gold"  id="btn-save"   onclick="saveForm()">Créer le compte →</button>
      <button class="btn btn-ghost" onclick="closeForm()">Annuler</button>
    </div>
  </div>

  <!-- Liste des comptes -->
  <div class="card">
    <div class="sec">Comptes</div>
    <div id="accounts-list" style="color:var(--text-muted);font-size:13px">Chargement…</div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../shared/barriere.js"></script>
<script src="../shared/supabase.js"></script>
<script src="../shared/auth.js"></script>
<script>
  AUTH.guard({ loginUrl: '../login.html', role: 'admin' });

  let _editId   = null;
  let _allRoles = [];

  const PANELS = [
    { id: 'declarations',   label: 'Déclarations' },
    { id: 'extras',         label: 'Extras'        },
    { id: 'configurations', label: 'Config.'        },
    { id: 'prize-pool',     label: 'Prize Pool'    },
    { id: 'leaderboard',    label: 'Leaderboard'   },
  ];

  // ── Chargement ───────────────────────────────────────
  async function loadAndRender() {
    try {
      const [users, roles] = await Promise.all([SB.listUsers(), SB.getRoles()]);
      _allRoles = roles;
      renderList(users);
    } catch(e) {
      showErr('Erreur de chargement : ' + e.message);
    }
  }

  function chipClass(slug) {
    if (slug === 'admin') return 'chip-admin';
    if (slug === 'mcd')   return 'chip-mcd';
    if (slug === 'floor') return 'chip-floor';
    return 'chip-custom';
  }

  function roleLabel(slug) {
    const r = _allRoles.find(r => r.slug === slug);
    return r ? r.label : slug;
  }

  function renderList(users) {
    const el = document.getElementById('accounts-list');
    if (!users.length) {
      el.innerHTML = '<div style="padding:20px 0;color:var(--text-muted)">Aucun compte.</div>';
      return;
    }

    const order = { admin: 0, mcd: 1, floor: 2 };
    users.sort(function(a, b) {
      const ro = (order[a.role] ?? 9) - (order[b.role] ?? 9);
      return ro !== 0 ? ro : a.email.localeCompare(b.email);
    });

    el.innerHTML = users.map(function(u) {
      const last = u.lastSignIn
        ? new Date(u.lastSignIn).toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'2-digit' })
        : '—';
      return '<div class="account-row">'
        + '<span class="account-email">' + u.email + '</span>'
        + '<span class="role-chip ' + chipClass(u.role) + '">' + roleLabel(u.role) + '</span>'
        + '<span class="account-last">' + last + '</span>'
        + '<div class="account-actions">'
        + '<button class="btn btn-ghost" style="padding:5px 10px;font-size:11px" onclick="editAccount(\'' + u.id + '\',\'' + u.email.replace(/'/g,'') + '\',\'' + u.role + '\')">✎</button>'
        + '<button class="btn btn-red"   style="padding:5px 10px;font-size:11px" onclick="deleteAccount(\'' + u.id + '\',\'' + u.email.replace(/'/g,'') + '\')">✕</button>'
        + '</div>'
        + '</div>';
    }).join('');
  }

  // ── Permissions ──────────────────────────────────────
  function togglePermissions() {
    const panel = document.getElementById('perm-panel');
    const btn   = document.getElementById('btn-perm');
    const open  = panel.classList.contains('hidden');
    if (open) {
      renderPermissionsPanel();
      panel.classList.remove('hidden');
      btn.style.color = 'var(--gold)';
      btn.style.borderColor = 'rgba(196,160,74,.3)';
    } else {
      panel.classList.add('hidden');
      btn.style.color = '';
      btn.style.borderColor = '';
    }
  }

  function renderPermissionsPanel() {
    const tbody = document.getElementById('perm-table-body');
    tbody.innerHTML = _allRoles.map(function(role) {
      const isAdmin   = role.slug === 'admin';
      const isBuiltin = ['admin','mcd','floor'].includes(role.slug);

      const cells = PANELS.map(function(p) {
        if (isAdmin) return '<td><span class="perm-dot"></span></td>';
        const checked = (role.panels || []).includes(p.id) ? 'checked' : '';
        return '<td><input type="checkbox" class="perm-cb" data-slug="' + role.slug + '" data-panel="' + p.id + '" ' + checked + '></td>';
      }).join('');

      const delBtn = isBuiltin ? '<td></td>'
        : '<td><button class="btn btn-red" style="padding:4px 8px;font-size:11px" onclick="deleteRoleRow(\'' + role.slug + '\')" title="Supprimer">✕</button></td>';

      return '<tr data-slug="' + role.slug + '">'
        + '<td class="col-role">' + role.label + '</td>'
        + cells
        + delBtn
        + '</tr>';
    }).join('');
  }

  async function savePermissions() {
    const btn = document.getElementById('perm-save-btn');
    const msg = document.getElementById('perm-msg');
    msg.textContent = ''; msg.className = 'perm-msg';
    btn.disabled = true;

    try {
      const byRole = {};
      document.querySelectorAll('.perm-cb').forEach(function(cb) {
        const slug = cb.dataset.slug;
        if (!byRole[slug]) byRole[slug] = [];
        if (cb.checked) byRole[slug].push(cb.dataset.panel);
      });

      await Promise.all(_allRoles
        .filter(r => r.slug !== 'admin')
        .map(r => SB.upsertRole(r.slug, r.label, byRole[r.slug] || [])));

      AUTH.clearRolesCache();
      _allRoles = _allRoles.map(r =>
        r.slug === 'admin' ? r : Object.assign({}, r, { panels: byRole[r.slug] || [] })
      );

      msg.textContent = 'Enregistré ✓';
      msg.className = 'perm-msg ok';
      setTimeout(() => { msg.textContent = ''; msg.className = 'perm-msg'; }, 2500);
    } catch(e) {
      msg.textContent = 'Erreur : ' + e.message;
      msg.className = 'perm-msg err';
    } finally {
      btn.disabled = false;
    }
  }

  // ── Nouveau rôle ─────────────────────────────────────
  function showNewRoleRow() {
    document.getElementById('new-role-row').classList.remove('hidden');
    document.getElementById('btn-add-role').style.display = 'none';
    document.getElementById('new-role-label').value = '';
    document.getElementById('new-role-slug-preview').innerHTML = '';
    document.getElementById('new-role-label').focus();
  }

  function cancelNewRole() {
    document.getElementById('new-role-row').classList.add('hidden');
    document.getElementById('btn-add-role').style.display = '';
  }

  function onNewRoleInput(val) {
    const slug = slugify(val);
    const el   = document.getElementById('new-role-slug-preview');
    el.innerHTML = slug ? 'slug : <b>' + slug + '</b>' : '';
  }

  async function confirmNewRole() {
    const label = document.getElementById('new-role-label').value.trim();
    if (!label) return;
    const slug = slugify(label);
    if (!slug) return;
    if (_allRoles.find(r => r.slug === slug)) {
      alert('Un rôle avec ce slug existe déjà.');
      return;
    }
    try {
      await SB.upsertRole(slug, label, []);
      _allRoles.push({ slug, label, panels: [] });
      cancelNewRole();
      renderPermissionsPanel();
      populateRoleSelect();
    } catch(e) { alert('Erreur : ' + e.message); }
  }

  async function deleteRoleRow(slug) {
    const role = _allRoles.find(r => r.slug === slug);
    if (!role || !confirm('Supprimer le rôle « ' + role.label + ' » ?')) return;
    try {
      await SB.deleteRole(slug);
      AUTH.clearRolesCache();
      _allRoles = _allRoles.filter(r => r.slug !== slug);
      renderPermissionsPanel();
      populateRoleSelect();
    } catch(e) { alert('Erreur : ' + e.message); }
  }

  function slugify(str) {
    return str.toLowerCase()
      .normalize('NFD').replace(/[̀-ͯ]/g, '')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '');
  }

  // ── Select rôle ──────────────────────────────────────
  function populateRoleSelect(current) {
    const sel = document.getElementById('inp-role');
    sel.innerHTML = _allRoles.map(r =>
      '<option value="' + r.slug + '">' + r.label + '</option>'
    ).join('');
    if (current) sel.value = current;
  }

  // ── Formulaire ───────────────────────────────────────
  function openForm() {
    _editId = null;
    document.getElementById('form-sec').textContent = 'Nouveau compte';
    document.getElementById('inp-email').value    = '';
    document.getElementById('inp-password').value = '';
    document.getElementById('inp-email').disabled = false;
    document.getElementById('fg-password').style.display = '';
    document.getElementById('pwd-hint').style.display    = 'none';
    document.getElementById('btn-save').textContent = 'Créer le compte →';
    populateRoleSelect('floor');
    document.getElementById('form-panel').classList.remove('hidden');
    document.getElementById('inp-email').focus();
    hideAlerts();
  }

  function editAccount(id, email, role) {
    _editId = id;
    document.getElementById('form-sec').textContent = email;
    document.getElementById('inp-email').value    = email;
    document.getElementById('inp-password').value = '';
    document.getElementById('inp-email').disabled = true;
    document.getElementById('fg-password').style.display = '';
    document.getElementById('pwd-hint').style.display    = '';
    document.getElementById('btn-save').textContent = 'Enregistrer →';
    populateRoleSelect(role);
    document.getElementById('form-panel').classList.remove('hidden');
    document.getElementById('inp-role').focus();
    hideAlerts();
  }

  function closeForm() {
    document.getElementById('form-panel').classList.add('hidden');
    _editId = null;
  }

  async function saveForm() {
    const email    = document.getElementById('inp-email').value.trim();
    const password = document.getElementById('inp-password').value;
    const role     = document.getElementById('inp-role').value;
    const btn      = document.getElementById('btn-save');
    hideAlerts();

    if (!_editId && !email)            { showErr('L\'e-mail est requis.'); return; }
    if (!_editId && password.length < 8) { showErr('Le mot de passe doit faire au moins 8 caractères.'); return; }
    if (_editId && password && password.length < 8) { showErr('Mot de passe trop court (8 car. min).'); return; }

    btn.disabled = true;
    try {
      if (!_editId) {
        await SB.createUser(email, password, role);
        showOk('Compte créé.');
      } else {
        await SB.updateUser(_editId, Object.assign({ role }, password ? { password } : {}));
        showOk('Compte mis à jour.');
      }
      closeForm();
      await loadAndRender();
    } catch(e) {
      showErr('Erreur : ' + e.message);
    } finally {
      btn.disabled = false;
    }
  }

  // ── Suppression ──────────────────────────────────────
  async function deleteAccount(id, email) {
    if (!confirm('Supprimer « ' + email + ' » ?')) return;
    hideAlerts();
    try {
      await SB.deleteUser(id);
      showOk('Compte supprimé.');
      await loadAndRender();
    } catch(e) { showErr('Erreur : ' + e.message); }
  }

  // ── Alertes ──────────────────────────────────────────
  function showOk(msg)  { const el = document.getElementById('alert-ok');  el.textContent = msg; el.style.display = 'flex'; }
  function showErr(msg) { const el = document.getElementById('alert-err'); el.textContent = msg; el.style.display = 'flex'; }
  function hideAlerts() {
    document.getElementById('alert-ok').style.display  = 'none';
    document.getElementById('alert-err').style.display = 'none';
  }

  loadAndRender();
</script>
</body>
</html>
